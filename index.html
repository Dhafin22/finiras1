<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Finiras Investasi — Platform DCA Crypto Rupiah</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js">
    </script>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface2: #f1f5f9;
            --border: #e2e8f0;
            --text: #0f172a;
            --text2: #334155;
            --text3: #64748b;
            --blue: #1e3a8a;
            --blue2: #1d4ed8;
            --blue3: #2563eb;
            --blue4: #3b82f6;
            --blue5: #60a5fa;
            --blue-light: #dbeafe;
            --blue-bg: #eff6ff;
            --blue-50: #f0f7ff;
            --green: #059669;
            --green-bg: #ecfdf5;
            --green-light: #d1fae5;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --red-light: #fee2e2;
            --orange: #ea580c;
            --orange-bg: #fff7ed;
            --orange-light: #ffedd5;
            --gold: #b45309;
            --gold-bg: #fffbeb;
            --gold-light: #fef3c7;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06), 0 2px 6px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 12px 30px rgba(0, 0, 0, 0.07), 0 4px 10px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 20px 50px rgba(0, 0, 0, 0.1), 0 8px 20px rgba(0, 0, 0, 0.05);
            --radius-xl: 18px;
            --radius-lg: 14px;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-w: 268px;
            --font: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            --gradient-sidebar: linear-gradient(180deg, #1e3a8a 0%, #1d4ed8 40%, #2563eb 100%);
            --gradient-accent: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --gradient-card-blue: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
            --gradient-hero: linear-gradient(135deg, #1e3a8a 0%, #2563eb 60%, #3b82f6 100%);
        }
        body.dark {
            --bg: #0b1120;
            --surface: #1a2332;
            --surface2: #1f2a3a;
            --border: #2d3a4a;
            --text: #e8ecf1;
            --text2: #c5cdd8;
            --text3: #8899aa;
            --blue-light: #1a3050;
            --blue-bg: #152030;
            --blue-50: #111d2e;
            --green-bg: #0d2820;
            --green-light: #0a3528;
            --red-bg: #2d1515;
            --red-light: #3d1a1a;
            --orange-bg: #2d1e10;
            --orange-light: #3d2815;
            --gold-bg: #251e08;
            --gold-light: #302810;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.25);
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 30px rgba(0, 0, 0, 0.45);
            --shadow-xl: 0 20px 50px rgba(0, 0, 0, 0.5);
            --gradient-card-blue: linear-gradient(135deg, #152030 0%, #1a2332 100%);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            transition: background 0.4s, color 0.4s;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
            letter-spacing: -0.01em;
            overflow-x: hidden;
        }
        .sidebar {
            width: var(--sidebar-w);
            background: var(--gradient-sidebar);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.35s;
            box-shadow: var(--shadow-xl);
            overflow-y: auto;
            overflow-x: hidden;
        }
        .sidebar::-webkit-scrollbar {
            width: 3px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
        }
        .sidebar-logo {
            padding: 20px 20px 16px 20px;
            display: flex;
            align-items: center;
            gap: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }
        .sidebar-logo .logo-icon {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 19px;
            flex-shrink: 0;
            letter-spacing: -1px;
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
        }
        .sidebar-logo .logo-text {
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.3px;
            color: #fff;
            white-space: nowrap;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .sidebar-nav button {
            display: flex;
            align-items: center;
            gap: 11px;
            width: 100%;
            padding: 10px 15px;
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13.5px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.78);
            transition: all 0.2s ease;
            text-align: left;
            font-family: var(--font);
            white-space: nowrap;
            letter-spacing: -0.1px;
            position: relative;
            overflow: hidden;
        }
        .sidebar-nav button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateX(2px);
        }
        .sidebar-nav button.active {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
        }
        .sidebar-nav button.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 3.5px;
            background: #fff;
            border-radius: 0 4px 4px 0;
        }
        .sidebar-nav button svg {
            width: 19px;
            height: 19px;
            flex-shrink: 0;
            opacity: 0.9;
        }
        .sidebar-footer {
            padding: 14px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 10.5px;
            color: rgba(255, 255, 255, 0.55);
            text-align: center;
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: margin 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 0;
            min-height: 100vh;
            position: relative;
        }
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 50;
            transition: background 0.4s, border 0.4s;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.85);
        }
        body.dark .topbar {
            background: rgba(26, 35, 50, 0.88);
            backdrop-filter: blur(10px);
        }
        .topbar h1 {
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.4px;
            color: var(--text);
            transition: color 0.4s;
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all 0.25s ease;
            font-family: var(--font);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
            letter-spacing: -0.1px;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: transparent;
            border-radius: inherit;
            pointer-events: none;
            transition: background 0.3s;
        }
        .btn:active::after {
            background: rgba(0, 0, 0, 0.08);
        }
        .btn-primary {
            background: var(--gradient-accent);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(30, 58, 138, 0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(30, 58, 138, 0.4);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: var(--surface);
            color: var(--blue);
            border-color: var(--border);
            box-shadow: var(--shadow-sm);
        }
        .btn-outline:hover {
            background: var(--blue-50);
            border-color: var(--blue4);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .btn-sm {
            padding: 7px 14px;
            font-size: 12px;
            border-radius: 8px;
        }
        .btn-xs {
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 6px;
            font-weight: 500;
        }
        .btn-danger {
            background: #fff;
            color: var(--red);
            border-color: var(--red-light);
        }
        .btn-danger:hover {
            background: var(--red-bg);
            border-color: var(--red);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.15);
        }
        .btn-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--text2);
        }
        .btn-ghost:hover {
            background: var(--surface2);
        }
        .btn-gold {
            background: var(--gold-bg);
            color: var(--gold);
            border-color: var(--gold-light);
        }
        .btn-gold:hover {
            background: #fef3c7;
            border-color: #f59e0b;
        }
        .content {
            padding: 26px;
            flex: 1;
            overflow-y: auto;
        }
        .content::-webkit-scrollbar {
            width: 5px;
        }
        .content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        .page {
            display: none;
            animation: fadeSlideIn 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        .page.active {
            display: block;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 22px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            margin-bottom: 18px;
        }
        .card:hover {
            box-shadow: var(--shadow-md);
            border-color: transparent;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-title {
            font-weight: 700;
            font-size: 15.5px;
            letter-spacing: -0.3px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px 22px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-3px);
            border-color: transparent;
        }
        .stat-card .stat-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 10px;
            background: var(--blue-bg);
            color: var(--blue);
        }
        .stat-card .stat-label {
            font-size: 11.5px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .stat-card .stat-value {
            font-size: 25px;
            font-weight: 800;
            letter-spacing: -0.6px;
            color: var(--text);
            line-height: 1.2;
        }
        .stat-card .stat-sub {
            font-size: 11.5px;
            color: var(--text3);
            margin-top: 4px;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
            transition: all 0.3s;
            box-shadow: var(--shadow-sm);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th,
        td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        th {
            background: var(--surface2);
            font-weight: 700;
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--text3);
            transition: background 0.4s;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        tbody tr {
            transition: background 0.2s ease;
        }
        tbody tr:hover td {
            background: var(--blue-50);
        }
        tbody tr:nth-child(even) td {
            background: var(--surface2);
        }
        tbody tr:hover td {
            background: var(--blue-bg) !important;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 12.5px;
            margin-bottom: 5px;
            color: var(--text2);
            letter-spacing: -0.1px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 11px 15px;
            border: 1.8px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--surface);
            color: var(--text);
            transition: all 0.25s ease;
            font-family: var(--font);
            letter-spacing: -0.1px;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--blue3);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.07);
            background: var(--blue-50);
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 28px 30px;
            width: 92%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            animation: scaleIn 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
            border: 1px solid var(--border);
        }
        .modal::-webkit-scrollbar {
            width: 4px;
        }
        .modal::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        .modal h3 {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 18px;
            letter-spacing: -0.4px;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.4px;
            transition: all 0.2s;
        }
        .badge-blue {
            background: var(--blue-bg);
            color: var(--blue);
        }
        .badge-green {
            background: var(--green-bg);
            color: var(--green);
        }
        .badge-orange {
            background: var(--orange-bg);
            color: var(--orange);
        }
        .badge-gold {
            background: var(--gold-bg);
            color: var(--gold);
        }
        .chart-box {
            position: relative;
            width: 100%;
            max-height: 380px;
        }
        .chart-box canvas {
            width: 100% !important;
            max-height: 380px;
        }
        .tabs {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .tab-btn {
            padding: 9px 18px;
            border-radius: 22px;
            border: 1.8px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s ease;
            color: var(--text2);
            font-family: var(--font);
        }
        .tab-btn.active {
            background: var(--gradient-accent);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            align-items: center;
        }
        .search-box input {
            padding: 10px 16px;
            border: 1.8px solid var(--border);
            border-radius: 10px;
            font-size: 13.5px;
            background: var(--surface);
            color: var(--text);
            flex: 1;
            min-width: 180px;
            font-family: var(--font);
            transition: all 0.25s;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--blue3);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.06);
        }
        .search-box select {
            padding: 10px 14px;
            border: 1.8px solid var(--border);
            border-radius: 10px;
            font-size: 13.5px;
            background: var(--surface);
            color: var(--text);
            font-family: var(--font);
            cursor: pointer;
        }
        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: var(--text);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .hamburger:hover {
            background: var(--surface2);
        }
        .hamburger svg {
            width: 26px;
            height: 26px;
        }
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            z-index: 150;
            padding: 5px 2px;
            justify-content: space-around;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
            transition: background 0.4s, border 0.4s;
        }
        body.dark .bottom-nav {
            background: rgba(26, 35, 50, 0.95);
            backdrop-filter: blur(10px);
        }
        .bottom-nav button {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 8.5px;
            color: var(--text3);
            font-family: var(--font);
            padding: 6px 3px;
            border-radius: 10px;
            transition: all 0.25s;
            font-weight: 500;
            flex: 1;
            min-width: 0;
        }
        .bottom-nav button.active {
            color: var(--blue);
            font-weight: 700;
            background: var(--blue-bg);
        }
        .bottom-nav button svg {
            width: 18px;
            height: 18px;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #0f172a;
            color: #fff;
            padding: 13px 22px;
            border-radius: 10px;
            z-index: 999;
            font-weight: 600;
            font-size: 13px;
            animation: slideInRight 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            box-shadow: var(--shadow-xl);
            letter-spacing: -0.1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .quote-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 24px 26px;
            border: 2px solid var(--border);
            border-left: 5px solid var(--blue);
            transition: all 0.3s;
            position: relative;
            box-shadow: var(--shadow);
        }
        .quote-card.gold {

    <script>
        (function() {
            // ==================== DATA & STATE ====================
            const STORAGE_KEY = 'finiras_investasi_data_v2';
            const SETTINGS_KEY = 'finiras_investasi_settings_v2';

            const EXCHANGES = [
                { name: 'Indodax', link: 'https://play.google.com/store/apps/details?id=id.co.bitcoin' },
                { name: 'Triv', link: 'https://play.google.com/store/apps/details?id=id.co.triv' },
                { name: 'Floq', link: 'https://play.google.com/store/apps/details?id=id.kriptomaksima.app' },
                { name: 'Tokocrypto', link: 'https://play.google.com/store/apps/details?id=com.binance.cloud.tokocrypto' },
                { name: 'Pintu', link: 'https://play.google.com/store/apps/details?id=com.valar.pintu' },
                { name: 'Reku', link: 'https://play.google.com/store/apps/details?id=com.rekeningku' },
                { name: 'Pluang', link: 'https://play.google.com/store/apps/details?id=com.EmasDigi' },
                { name: 'Ajaib Kripto', link: 'https://play.google.com/store/apps/details?id=coin.ajaib.co.id' }
            ];

            const defaultSettings = {
                theme: 'light',
                language: 'id',
                formatRupiah: true,
            };

            function loadData() {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    try { return JSON.parse(raw); } catch (e) {}
                }
                return { transactions: [], watchlist: [], notes: [] };
            }

            function saveData(data) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            function loadSettings() {
                const raw = localStorage.getItem(SETTINGS_KEY);
                if (raw) {
                    try { return { ...defaultSettings, ...JSON.parse(raw) }; } catch (e) {}
                }
                return { ...defaultSettings };
            }

            function saveSettings(settings) {
                localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
            }

            let appData = loadData();
            appData.transactions = appData.transactions.map(tx => ({
                ...tx,
                exchange: tx.exchange || ''
            }));
            saveData(appData);

            let appSettings = loadSettings();

            function applyTheme() {
                document.body.classList.toggle('dark', appSettings.theme === 'dark');
            }
            applyTheme();

            // ==================== HELPERS ====================
            function formatRupiah(num) {
                if (num === null || num === undefined || isNaN(num)) return 'Rp0';
                const n = Math.round(Math.abs(num));
                const parts = n.toString().split('.');
                const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                return 'Rp' + intPart;
            }

            function formatNumber(num, decimals = 6) {
                if (num === null || num === undefined || isNaN(num)) return '0';
                return Number(num).toLocaleString('id-ID', { minimumFractionDigits: 0,
                    maximumFractionDigits: decimals });
            }

            function formatDateTime(isoString) {
                const d = new Date(isoString);
                const hari = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'][d.getDay()];
                const bulan = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September',
                    'Oktober', 'November', 'Desember'
                ][d.getMonth()];
                const tgl = d.getDate().toString().padStart(2, '0');
                const thn = d.getFullYear();
                const jam = d.getHours().toString().padStart(2, '0');
                const mnt = d.getMinutes().toString().padStart(2, '0');
                const dtk = d.getSeconds().toString().padStart(2, '0');
                return {
                    full: `${hari}, ${tgl} ${bulan} ${thn} — ${jam}:${mnt}:${dtk}`,
                    date: `${tgl} ${bulan} ${thn}`,
                    time: `${jam}:${mnt}`,
                    hari,
                    bulan,
                    tahun: thn,
                    jam,
                    menit: mnt,
                    detik: dtk,
                };
            }

            function generateId() {
                return 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            }

            function showToast(msg) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = '✅ ' + msg;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s';
                    setTimeout(() => toast.remove(), 300);
                }, 2500);
            }

            // ==================== PORTFOLIO CALC ====================
            function getPortfolioData() {
                const map = {};
                appData.transactions.forEach(tx => {
                    const sym = tx.coinSymbol.toUpperCase();
                    if (!map[sym]) {
                        map[sym] = {
                            coinSymbol: sym,
                            coinName: tx.coinName,
                            totalModal: 0,
                            totalAmount: 0,
                            transactions: [],
                        };
                    }
                    map[sym].totalModal += tx.totalCost;
                    map[sym].totalAmount += tx.amount;
                    map[sym].transactions.push(tx);
                });
                const result = Object.values(map).map(item => {
                    const avgPrice = item.totalAmount > 0 ? item.totalModal / item.totalAmount : 0;
                    return { ...item, avgPrice };
                });
                result.sort((a, b) => b.totalModal - a.totalModal);
                return result;
            }

            function getTotalSummary() {
                const portfolio = getPortfolioData();
                const totalModal = portfolio.reduce((s, p) => s + p.totalModal, 0);
                const totalAmount = portfolio.reduce((s, p) => s + p.totalAmount, 0);
                const avgBuyAll = totalAmount > 0 ? totalModal / totalAmount : 0;
                return { totalModal, totalAmount, avgBuyAll, portfolio, totalAset: portfolio.length };
            }

            function getAvgBuyForCoin(coinSymbol) {
                const sym = coinSymbol.toUpperCase();
                const txs = appData.transactions.filter(t => t.coinSymbol.toUpperCase() === sym);
                const totalModal = txs.reduce((s, t) => s + t.totalCost, 0);
                const totalAmount = txs.reduce((s, t) => s + t.amount, 0);
                return totalAmount > 0 ? totalModal / totalAmount : 0;
            }

            // ==================== NAVIGATION ====================
            const contentArea = document.getElementById('contentArea');
            const pageTitle = document.getElementById('pageTitle');
            let currentPage = 'dashboard';
            let chartInstances = {};

            let riwayatFilter = '';
            let riwayatSortBy = 'timestamp';
            let riwayatSortDir = 'desc';
            let searchCursorStart = 0;
            let searchCursorEnd = 0;
            let selectedTxIds = new Set();

            function destroyChart(key) {
                if (chartInstances[key]) {
                    chartInstances[key].destroy();
                    delete chartInstances[key];
                }
            }

            function destroyAllCharts() {
                Object.keys(chartInstances).forEach(k => destroyChart(k));
            }

            function navigateTo(pageName) {
                destroyAllCharts();
                currentPage = pageName;
                document.querySelectorAll('.sidebar-nav button, .bottom-nav button').forEach(b => b.classList.remove(
                    'active'));
                const sidebarBtn = document.querySelector(`.sidebar-nav button[data-page="${pageName}"]`);
                const bottomBtn = document.querySelector(`.bottom-nav button[data-page="${pageName}"]`);
                if (sidebarBtn) sidebarBtn.classList.add('active');
                if (bottomBtn) bottomBtn.classList.add('active');
                renderPage(pageName);
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('contentArea').scrollTop = 0;
                updateBackToTop();
            }

            function renderPage(pageName) {
                const titles = {
                    dashboard: '📊 Dashboard',
                    transaksi: '➕ Transaksi DCA',
                    riwayat: '📜 Riwayat Transaksi',
                    portofolio: '💼 Portofolio',
                    alokasi: '🍩 Alokasi Portofolio',
                    kalkulator: '🧮 Kalkulator DCA',
                    catatan: '📝 Catatan Investasi',
                    watchlist: '⭐ Watchlist',
                    statistik: '📈 Statistik & Insight',
                    motivasi: '🌟 Motivasi Investor',
                    exchange: '📱 Aplikasi Exchange Crypto',
                    pengaturan: '⚙️ Pengaturan',
                };
                pageTitle.textContent = titles[pageName] || 'Finiras Investasi';
                switch (pageName) {
                    case 'dashboard': renderDashboard(); break;
                    case 'transaksi': renderTransaksi(); break;
                    case 'riwayat': renderRiwayat(); break;
                    case 'portofolio': renderPortofolio(); break;
                    case 'alokasi': renderAlokasi(); break;
                    case 'kalkulator': renderKalkulator(); break;
                    case 'catatan': renderCatatan(); break;
                    case 'watchlist': renderWatchlist(); break;
                    case 'statistik': renderStatistik(); break;
                    case 'motivasi': renderMotivasi(); break;
                    case 'exchange': renderExchange(); break;
                    case 'pengaturan': renderPengaturan(); break;
                    default: renderDashboard();
                }
                updateBackToTop();
            }

            // ==================== TRANSAKSI DCA ====================

                    const nominal = parseFloat(document.getElementById('txNominal').value);
                    const harga = parseFloat(document.getElementById('txHargaBeli').value);
                    if (nominal > 0 && harga > 0) {
                        document.getElementById('txJumlahCoin').value = (nominal / harga).toFixed(8);
                        showToast('Jumlah coin dihitung: ' + formatNumber(nominal / harga, 8));

                        showToast('⚠️ Isi nominal dan harga terlebih dahulu');

                document.getElementById('formTransaksi').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const coinName = document.getElementById('txCoinName').value.trim();

                    const nominal = parseFloat(document.getElementById('txNominal').value);
                    const hargaBeli = parseFloat(document.getElementById('txHargaBeli').value);

                    if (isNaN(jumlahCoin) || jumlahCoin <= 0) {
                        jumlahCoin = nominal / hargaBeli;
                    }
                    const totalCost = jumlahCoin * hargaBeli;
                    const tx = {
                        id: generateId(),
                        coinName,
                        coinSymbol,
                        buyPrice: hargaBeli,
                        amount: jumlahCoin,
                        totalCost,
                        nominalInput: nominal,
                        exchange,
                        notes: catatan,

                    showToast('Transaksi DCA berhasil dicatat!');
                    document.getElementById('formTransaksi').reset();
                    renderTransaksi();
                });

            // ==================== RIWAYAT ====================
            function hapusTransaksiTerpilih() {
                if (selectedTxIds.size === 0) {
                    showToast('⚠️ Pilih dulu transaksi yang akan dihapus');
                    return;
                }
                if (confirm(`⚠️ Hapus ${selectedTxIds.size} transaksi terpilih? Data tidak bisa dikembalikan.`)) {
                    const count = selectedTxIds.size;
                    appData.transactions = appData.transactions.filter(tx => !selectedTxIds.has(tx.id));
                    selectedTxIds.clear();
                    saveData(appData);
                    showToast(`${count} transaksi dihapus.`);
                    renderRiwayat();
                }
            }

            function renderRiwayat() {
                const filter = riwayatFilter;
                const sortBy = riwayatSortBy;
                const sortDir = riwayatSortDir;

                let html = `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">📜 Riwayat Seluruh Transaksi DCA</span>
                        <span class="counter-badge" id="resultCount">0 transaksi</span>
                    </div>
                    <div class="search-box">
                        <input type="text" id="searchRiwayat" placeholder="🔍 Cari nama coin, simbol, exchange, atau catatan..." value="${filter.replace(/"/g, '&quot;')}">
                        <select id="sortRiwayat">
                            <option value="timestamp-desc" ${sortBy==='timestamp'&&sortDir==='desc'?'selected':''}>🕐 Terbaru</option>
                            <option value="timestamp-asc" ${sortBy==='timestamp'&&sortDir==='asc'?'selected':''}>🕐 Terlama</option>
                            <option value="totalCost-desc" ${sortBy==='totalCost'&&sortDir==='desc'?'selected':''}>💰 Modal Terbesar</option>
                            <option value="totalCost-asc" ${sortBy==='totalCost'&&sortDir==='asc'?'selected':''}>💰 Modal Terkecil</option>
                            <option value="coinName-asc" ${sortBy==='coinName'&&sortDir==='asc'?'selected':''}>🔤 Nama A-Z</option>
                            <option value="coinName-desc" ${sortBy==='coinName'&&sortDir==='desc'?'selected':''}>🔤 Nama Z-A</option>
                        </select>
                    </div>`;

                let txs = [...appData.transactions];
                if (filter) {
                    const f = filter.toLowerCase();
                    txs = txs.filter(tx => tx.coinName.toLowerCase().includes(f) || tx.coinSymbol.toLowerCase()
                        .includes(f) || (tx.exchange && tx.exchange.toLowerCase().includes(f)) || (tx.notes && tx.notes.toLowerCase().includes(f)));
                }
                if (sortBy === 'timestamp') {
                    txs.sort((a, b) => sortDir === 'desc' ? new Date(b.timestamp) - new Date(a.timestamp) : new Date(a
                        .timestamp) - new Date(b.timestamp));
                } else if (sortBy === 'totalCost') {
                    txs.sort((a, b) => sortDir === 'desc' ? b.totalCost - a.totalCost : a.totalCost - b.totalCost);
                } else if (sortBy === 'coinName') {
                    txs.sort((a, b) => sortDir === 'desc' ? b.coinName.localeCompare(a.coinName) : a.coinName.localeCompare(
                        b.coinName));
                }

                if (txs.length === 0) {
                    html +=
                        `<p style="text-align:center;padding:50px;color:var(--text3);">📭 Belum ada riwayat transaksi${filter?' dengan kata kunci "'+filter+'"':''}.</p>`;
                } else {
                    html += `
                    <div class="table-wrap">
                        <table>
                            <thead><tr>
                                <th style="width:40px;"><input type="checkbox" id="selectAllCheckbox" title="Pilih semua"></th>
                                <th>Waktu Transaksi</th><th>Aset</th><th>Exchange</th><th>Harga Beli (Rp)</th><th>Jumlah Coin</th><th>Total Modal (Rp)</th><th>Avg Buy* (Rp)</th><th>Catatan</th><th>Aksi</th>
                            </tr></thead>
                            <tbody>`;
                    txs.forEach(tx => {
                        const dt = formatDateTime(tx.timestamp);
                        const avgBuy = getAvgBuyForCoin(tx.coinSymbol);
                        const isChecked = selectedTxIds.has(tx.id) ? 'checked' : '';
                        html += `
                                <tr>
                                    <td><input type="checkbox" class="tx-checkbox" data-id="${tx.id}" ${isChecked}></td>
                                    <td><small style="line-height:1.5;">${dt.full}</small></td>
                                    <td><strong>${tx.coinName}</strong><br><small style="color:var(--text3);">${tx.coinSymbol}</small></td>
                                    <td><span class="badge badge-blue">${tx.exchange || '—'}</span></td>
                                    <td>${formatRupiah(tx.buyPrice)}</td>
                                    <td>${formatNumber(tx.amount,8)}</td>
                                    <td><strong>${formatRupiah(tx.totalCost)}</strong></td>
                                    <td><span style="color:var(--blue);font-weight:600;">${formatRupiah(avgBuy)}</span></td>
                                    <td>${tx.notes || '—'}</td>
                                    <td style="display:flex;gap:5px;flex-wrap:wrap;">
                                        <button class="btn btn-outline btn-xs btn-edit-tx" data-id="${tx.id}" title="Edit">✏️</button>
                                        <button class="btn btn-danger btn-xs btn-del-tx" data-id="${tx.id}" title="Hapus">🗑️</button>
                                    </td>
                                </tr>`;
                    });
                    html += `</tbody></table></div>`;
                }

                if (selectedTxIds.size > 0) {
                    html += `
                    <div style="margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                        <span style="color:var(--red);font-weight:600;">${selectedTxIds.size} transaksi dipilih</span>
                        <button class="btn btn-danger btn-sm" id="btnHapusMassal">🗑️ Hapus Terpilih</button>
                        <button class="btn btn-ghost btn-sm" id="btnClearSelection">✖ Batal Pilih</button>
                    </div>`;
                }

                html +=
                    `<p style="font-size:10px;color:var(--text3);margin-top:8px;">* Avg Buy: Weighted average dari seluruh transaksi coin tersebut.</p>`;
                html += `</div>`;
                contentArea.innerHTML = html;

                const counter = document.getElementById('resultCount');
                if (counter) counter.textContent = `${txs.length} transaksi${filter?' ditemukan':''}`;

                const searchInput = document.getElementById('searchRiwayat');
                if (searchInput) {
                    if (document.activeElement && document.activeElement.id === 'searchRiwayat') {
                        searchInput.focus();
                        searchInput.setSelectionRange(searchCursorStart, searchCursorEnd);
                    }
                    searchInput.addEventListener('input', function() {
                        riwayatFilter = this.value;
                        searchCursorStart = this.selectionStart;
                        searchCursorEnd = this.selectionEnd;
                        renderRiwayat();
                    });
                }

                const sortSelect = document.getElementById('sortRiwayat');
                if (sortSelect) {
                    sortSelect.addEventListener('change', function() {
                        const [sBy, sDir] = this.value.split('-');
                        riwayatSortBy = sBy;
                        riwayatSortDir = sDir;
                        const inp = document.getElementById('searchRiwayat');
                        if (inp) {
                            searchCursorStart = inp.selectionStart;
                            searchCursorEnd = inp.selectionEnd;
                        }
                        renderRiwayat();
                    });
                }

                const selectAll = document.getElementById('selectAllCheckbox');
                if (selectAll) {
                    selectAll.addEventListener('change', function() {
                        const checkboxes = document.querySelectorAll('.tx-checkbox');
                        checkboxes.forEach(cb => {
                            cb.checked = this.checked;
                            const id = cb.dataset.id;
                            if (this.checked) selectedTxIds.add(id);
                            else selectedTxIds.delete(id);
                        });
                        renderRiwayat();
                    });
                }

                document.querySelectorAll('.tx-checkbox').forEach(cb => {
                    cb.addEventListener('change', function() {
                        const id = this.dataset.id;
                        if (this.checked) selectedTxIds.add(id);
                        else {
                            selectedTxIds.delete(id);
                            const sAll = document.getElementById('selectAllCheckbox');
                            if (sAll) sAll.checked = false;
                        }
                        renderRiwayat();
                    });
                });

                const hapusMassalBtn = document.getElementById('btnHapusMassal');
                if (hapusMassalBtn) hapusMassalBtn.addEventListener('click', hapusTransaksiTerpilih);
                const clearSelBtn = document.getElementById('btnClearSelection');
                if (clearSelBtn) clearSelBtn.addEventListener('click', function() { selectedTxIds.clear();
                    renderRiwayat(); });

                document.querySelectorAll('.btn-edit-tx').forEach(btn => btn.addEventListener('click', () =>
                    editTransaksi(btn.dataset.id)));
                document.querySelectorAll('.btn-del-tx').forEach(btn => btn.addEventListener('click', () =>
                    deleteTransaksi(btn.dataset.id)));
            }

            function editTransaksi(id) {
                const tx = appData.transactions.find(t => t.id === id);
                if (!tx) return;
                const exchangeOptions = EXCHANGES.map(e => `<option value="${e.name}" ${tx.exchange===e.name?'selected':''}>${e.name}</option>`).join('');
                const overlay = document.getElementById('modalOverlay');
                const modal = document.getElementById('modalContent');
                modal.innerHTML = `
                    <h3>✏️ Edit Transaksi</h3>
                    <form id="formEditTx">
                        <div class="form-group"><label>Nama Coin</label><input type="text" id="editCoinName" value="${tx.coinName}" required></div>
                        <div class="form-group"><label>Simbol</label><input type="text" id="editCoinSymbol" value="${tx.coinSymbol}" required style="text-transform:uppercase;"></div>

                        <div class="form-group"><label>Jumlah Coin</label><input type="number" id="editAmount" value="${tx.amount}" step="0.00000001" required></div>
                        <div class="form-group"><label>Exchange</label><select id="editExchange" required><option value="">-- Pilih Exchange --</option>${exchangeOptions}</select></div>
                        <div class="form-group"><label>Catatan</label><input type="text" id="editNotes" value="${tx.notes||''}"></div>
                        <small style="color:var(--text3);">⚠️ Mengedit transaksi akan mempengaruhi perhitungan Average Buy secara otomatis.</small>
                        <div style="display:flex;gap:10px;margin-top:14px;">
                            <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                            <button type="button" class="btn btn-outline" id="btnCancelEdit">Batal</button>
                        </div>
                    </form>`;
                overlay.style.display = 'flex';
                document.getElementById('btnCancelEdit').addEventListener('click', () => overlay.style.display = 'none');
                overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.style.display =
                        'none'; });
                document.getElementById('formEditTx').addEventListener('submit', function(e) {
                    e.preventDefault();
                    tx.coinName = document.getElementById('editCoinName').value.trim();
                    tx.coinSymbol = document.getElementById('editCoinSymbol').value.trim().toUpperCase();
                    tx.buyPrice = parseFloat(document.getElementById('editBuyPrice').value);
                    tx.amount = parseFloat(document.getElementById('editAmount').value);
                    tx.totalCost = tx.buyPrice * tx.amount;
                    tx.exchange = document.getElementById('editExchange').value;
                    tx.notes = document.getElementById('editNotes').value.trim();
                    saveData(appData);
                    overlay.style.display = 'none';
                    showToast('Transaksi diperbarui! Average buy dihitung ulang.');
                    renderRiwayat();
                });
            }

            function deleteTransaksi(id) {
                if (confirm('⚠️ Yakin ingin menghapus transaksi ini? Average buy akan dihitung ulang secara otomatis.')) {
                    appData.transactions = appData.transactions.filter(t => t.id !== id);
                    selectedTxIds.delete(id);
                    saveData(appData);
                    showToast('Transaksi dihapus. Average buy diperbarui.');
                    renderRiwayat();
                }
            }

            // ==================== MODAL TAMBAH TRANSAKSI ====================
            function openTambahTransaksiModal() {
                const overlay = document.getElementById('modalOverlay');
                const modal = document.getElementById('modalContent');

                    <h3>➕ Transaksi Pembelian DCA Baru</h3>
                    <form id="formModalTx">
                        <div class="form-group"><label>🏷️ Nama Coin/Token</label><input type="text" id="modalCoinName" placeholder="Contoh: Bitcoin" required list="coinListModal"><datalist id="coinListModal"><option value="Bitcoin"><option value="Ethereum"><option value="BNB"><option value="Hyperliquid"><option value="XRP"><option value="Solana"><option value="TRON"><option value="Doge"><option value="LINK"><option value="Cardano"><option value="Litecoin"><option value="SUI"><option value="AVAX"><option value="XAUt"><option value="Aster"><option value="AAVE"><option value="PAX Gold"></datalist></div>
                        <div class="form-group"><label>🔤 Simbol Coin</label><input type="text" id="modalCoinSymbol" placeholder="BTC" required style="text-transform:uppercase;"></div>
                        <div class="form-group"><label>💵 Nominal Beli (Rp)</label><input type="number" id="modalNominal" placeholder="Rp ..." required min="1000" step="1000"></div>
                        <div class="form-group"><label>💲 Harga Beli per Coin (Rp)</label><input type="number" id="modalHarga" required min="1" step="1"></div>
                        <div class="form-group"><label>🔢 Jumlah Coin</label><input type="number" id="modalJumlah" step="0.00000001" placeholder="Auto-hitung dari nominal ÷ harga"><small style="color:var(--text3);">Kosongkan untuk auto-hitung</small></div>
                        <div class="form-group"><label>🏦 Exchange / Platform</label><select id="modalExchange" required><option value="">-- Pilih Exchange --</option>${exchangeOptions}</select></div>
                        <div class="form-group"><label>📝 Catatan</label><input type="text" id="modalCatatan" placeholder="Opsional"></div>
                        <div style="display:flex;gap:10px;">
                            <button type="submit" class="btn btn-primary">💾 Simpan</button>
                            <button type="button" class="btn btn-outline" id="btnModalBatal">Batal</button>
                        </div>
                    </form>`;
                overlay.style.display = 'flex';
                document.getElementById('btnModalBatal').addEventListener('click', () => overlay.style.display = 'none');
                overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.style.display =
                        'none'; });
                document.getElementById('formModalTx').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const coinName = document.getElementById('modalCoinName').value.trim();
                    const coinSymbol = document.getElementById('modalCoinSymbol').value.trim().toUpperCase();
                    const nominal = parseFloat(document.getElementById('modalNominal').value);
                    const hargaBeli = parseFloat(document.getElementById('modalHarga').value);
                    let jumlahCoin = parseFloat(document.getElementById('modalJumlah').value);
                    const exchange = document.getElementById('modalExchange').value;
                    const catatan = document.getElementById('modalCatatan').value.trim();
                    if (!coinName || !coinSymbol || !nominal || !hargaBeli || !exchange) {
                        showToast('⚠️ Mohon isi semua field wajib termasuk Exchange');
                        return;
                    }
                    if (isNaN(jumlahCoin) || jumlahCoin <= 0) jumlahCoin = nominal / hargaBeli;
                    const tx = {
                        id: generateId(),
                        coinName,
                        coinSymbol,
                        buyPrice: hargaBeli,
                        amount: jumlahCoin,
                        totalCost: jumlahCoin * hargaBeli,
                        nominalInput: nominal,
                        exchange,
                        notes: catatan,
                        timestamp: new Date().toISOString(),
                    };
                    appData.transactions.unshift(tx);
                    saveData(appData);
                    overlay.style.display = 'none';
                    showToast('Transaksi DCA berhasil dicatat!');
                    navigateTo('riwayat');
                });
            }

                } else {
                    btn.classList.remove('visible');
                }
